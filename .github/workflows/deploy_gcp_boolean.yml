name: Terraform GCP Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  terraform:
    name: 'Terraform Plan and Apply'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      TF_VAR_project_id: curso-devops-402315
      TF_VAR_region_name: us-central1
      TF_VAR_github_user: pierobrunetti
      TF_VAR_artifact_registry_image: us-central1-docker.pkg.dev/curso-devops-402315/gcp-boolean-terraform/app:latest
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Show Terraform Plan Summary
        run: terraform show -no-color tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan

      - name: Manual Terraform Apply
        if: github.event_name == 'workflow_dispatch'
        run: terraform apply tfplan
